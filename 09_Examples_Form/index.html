<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap 5 Forms</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/bootstrap-forms-task/style.css">
</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-5 text-primary fw-bold">
Bootstrap 5 Attractive Forms
</h1>

<!-- Form 1 -->
<div class="card shadow-lg mb-5">
<div class="card-header bg-primary text-white">
<h3>Student Registration Form</h3>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" class="form-control" placeholder="Enter Name">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control" placeholder="Enter Email">
</div>

<div class="col-md-6 mb-3">
<label>Mobile</label>
<input type="text" class="form-control" placeholder="Enter Mobile">
</div>

<div class="col-md-6 mb-3">
<label>Course</label>
<select class="form-select">
<option>Computer</option>
<option>IT</option>
<option>Mechanical</option>
<option>Civil</option>
</select>
</div>

<div class="col-12 mb-3">
<label>Address</label>
<textarea class="form-control" rows="3"></textarea>
</div>

<div class="text-center">
<button class="btn btn-primary px-5">
Register
</button>
</div>

</div>
</div>
</div>

<!-- Form 2 -->

<div class="card shadow-lg mb-5">
<div class="card-header bg-success text-white">
<h3>Login Form</h3>
</div>

<div class="card-body">

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control">
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Remember Me
</label>
</div>

<div class="text-center">
<button class="btn btn-success px-5">
Login
</button>
</div>

</div>
</div>

<!-- Form 3 -->

<div class="card shadow-lg mb-5">
<div class="card-header bg-warning">
<h3>Contact Form</h3>
</div>

<div class="card-body">

<div class="mb-3">
<label>Name</label>
<input class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input class="form-control">
</div>

<div class="mb-3">
<label>Subject</label>
<input class="form-control">
</div>

<div class="mb-3">
<label>Message</label>
<textarea class="form-control" rows="4"></textarea>
</div>

<div class="text-center">
<button class="btn btn-warning px-5">
Send
</button>
</div>

</div>
</div>




<!-- Form 4 -->

<div class="card shadow-lg mb-5">
<div class="card-header bg-danger text-white">
<h3>Payment Form</h3>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label>Card Holder Name</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Card Number</label>
<input type="text" class="form-control" placeholder="1234 5678 9012 3456">
</div>

<div class="col-md-6 mb-3">
<label>Expiry Date</label>
<input type="month" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>CVV</label>
<input type="password" class="form-control">
</div>

<div class="text-center">
<button class="btn btn-danger px-5">
Pay Now
</button>
</div>

</div>
</div>
</div>

<!-- Form 5 -->

<div class="card shadow-lg mb-5">
<div class="card-header bg-dark text-white">
<h3>Job Application Form</h3>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Skills</label>
<input type="text" class="form-control">
</div>

<div class="col-12 mb-3">
<label>Upload Resume</label>
<input type="file" class="form-control">
</div>

<div class="text-center">
<button class="btn btn-dark px-5">
Apply Now
</button>
</div>

</div>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
