<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Equipment Shop</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

/* Navbar */
.navbar{
    background:#0b5d1e;
}

.navbar-brand{
    font-size:30px;
    font-weight:bold;
}

.nav-link{
    color:white !important;
    font-size:18px;
    margin-left:10px;
}

.nav-link:hover{
    color:#ffc107 !important;
}

/* Hero Section */

.hero{
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=1600");
    background-size:cover;
    background-position:center;
    min-height:90vh;
    display:flex;
    align-items:center;
    color:white;
}

.hero h1{
    font-size:60px;
    font-weight:bold;
}

.hero p{
    font-size:20px;
    margin:20px 0;
}

.hero img{
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,.4);
}

.btn-warning{
    padding:12px 30px;
    font-size:18px;
    font-weight:600;
}

.btn-outline-light{
    padding:12px 30px;
    font-size:18px;
    font-weight:600;
}

@media(max-width:768px){

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:38px;
}

.hero img{
margin-top:30px;
}

}

</style>

</head>
<body>



<nav class="navbar navbar-expand-lg navbar-dark shadow">

<div class="container">

<a class="navbar-brand" href="#">
🏏 Cricket Zone
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active" href="#">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Bats</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Balls</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Accessories</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Offers</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Contact</a>
</li>

</ul>

<div class="ms-3">

<a href="#" class="btn btn-warning">
<i class="bi bi-cart-fill"></i> Cart
</a>

</div>

</div>

</div>

</nav>


<section class="hero">

<div class="container">

<div class="row align-items-center">

<div class="col-lg-6">

<h1>
Play Like a Champion
</h1>

<p>
Get premium cricket bats, balls, gloves, helmets,
pads, shoes, kits and accessories from the world's
best brands at affordable prices.
</p>

<a href="#" class="btn btn-warning me-3">
Shop Now
</a>

<a href="#" class="btn btn-outline-light">
Explore Products
</a>

</div>

<div class="col-lg-6 text-center mt-5 mt-lg-0">

<img src="/11_Navbar_and_Hero-section/logo.png" class="img-fluid" alt="Cricket">


</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
